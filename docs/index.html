<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parrot — paste anything, instantly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; }
      body {
        background: #0a0a0a;
        color: #efefef;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 24px;
        max-width: 480px;
        width: 100%;
      }
      .logo { width: 64px; height: 64px; margin-bottom: 20px; }
      .logo img { width: 100%; height: 100%; }
      .logo-ring {
        width: 80px; height: 80px;
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(110,231,183,0.15), rgba(110,231,183,0.04));
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 24px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      }
      .logo-ring img { width: 56px; height: 56px; }
      h1 {
        font-size: 28px; font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }
      .tagline {
        font-size: 14px; line-height: 1.6;
        color: #666;
        margin-bottom: 32px;
      }
      .tagline span { color: #6ee7b7; }
      .actions {
        display: flex; gap: 10px;
        flex-wrap: wrap; justify-content: center;
      }
      .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 14px; font-weight: 600;
        text-decoration: none;
        transition: all 0.15s ease;
        border: none; cursor: pointer;
      }
      .btn-primary {
        background: #6ee7b7; color: #0a0a0a;
      }
      .btn-primary:hover { background: #5cd8a8; }
      .btn-secondary {
        background: #141414; color: #efefef;
        border: 1px solid #252525;
      }
      .btn-secondary:hover { background: #1c1c1c; }
      .btn-icon { width: 18px; height: 18px; }
      .features {
        display: flex; gap: 6px;
        margin-top: 36px;
        flex-wrap: wrap; justify-content: center;
      }
      .feature {
        font-size: 11px; padding: 6px 12px;
        background: #141414;
        border: 1px solid #252525;
        border-radius: 100px;
        color: #666;
      }
      .footer {
        margin-top: 40px;
        font-size: 11px; color: #444;
        display: flex; gap: 16px; align-items: center;
      }
      .footer a { color: #666; text-decoration: none; }
      .footer a:hover { color: #6ee7b7; }
      .byline { margin-top: 8px; font-size: 10px; color: #444; }
      .byline a { color: #555; text-decoration: none; transition: color 0.15s; }
      .byline a:hover { color: #6ee7b7; }
      .version {
        font-size: 10px; padding: 2px 8px;
        background: #141414;
        border: 1px solid #252525;
        border-radius: 6px;
        color: #444;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-ring">
        <img src="parrot-icon-transparent.png" alt="Parrot" />
      </div>

      <p class="tagline">
        Your prompts, always a&nbsp;keystroke away.<br />
        Paste <span>anything</span>, <span>instantly</span>.
      </p>

      <div class="actions">

      </div>

      <div class="features">
        <span class="feature">Global shortcut</span>
        <span class="feature">Instant paste</span>
        <span class="feature">Zero latency</span>
        <span class="feature">Always in tray</span>
      </div>

      <div class="footer">
        <span class="version">v0.1.0</span>
        <a href="https://github.com/goyalaakarsh/parrot/releases">Release notes</a>
        <a href="https://github.com/goyalaakarsh/parrot/blob/main/LICENSE">MIT License</a>

      <div class="byline">made by <a href="https://aakarshgoyal.in">aakarsh</a></div>
    </div>
  </body>
</html>
